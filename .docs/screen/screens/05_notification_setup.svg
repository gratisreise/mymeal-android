<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Header -->
  <text x="30" y="90" font-family="SF Pro Display" font-size="24" font-weight="700" fill="#111811">시작하기 전에</text>
  <text x="30" y="120" font-family="SF Pro Display" font-size="16" fill="#608a62">설정을 완료해주세요</text>

  <!-- Notification Permission Card -->
  <g transform="translate(20, 160)">
    <rect width="335" height="120" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Bell Icon -->
    <circle cx="50" cy="50" r="24" fill="#4cae4f" opacity="0.2" />
    <path d="M50 38 L50 42 M50 34 L50 36 M50 34 C46 34 43 37 43 41 L40 44 L40 46 L60 46 L60 44 L57 41 C57 37 54 34 50 34"
          stroke="#0bc911" stroke-width="2" fill="none" transform="translate(0, 5)" />
    <circle cx="50" cy="62" r="3" fill="#0bc911" />

    <text x="90" y="45" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">식사 후 알림을 보내드릴게요</text>
    <text x="90" y="70" font-family="SF Pro Display" font-size="14" fill="#608a62">식후 1시간 뒤 컨디션 체크 알림</text>

    <!-- Allow Button -->
    <g transform="translate(230, 75)">
      <rect width="80" height="32" rx="16" fill="url(#primaryGradient)" />
      <text x="40" y="21" text-anchor="middle" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#ffffff">허용</text>
    </g>
  </g>

  <!-- Meal Time Settings Card -->
  <g transform="translate(20, 300)">
    <rect width="335" height="240" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Clock Icon -->
    <circle cx="50" cy="50" r="24" fill="#FFB74D" opacity="0.2" />
    <circle cx="50" cy="50" r="10" stroke="#FFB74D" stroke-width="2" fill="none" />
    <line x1="50" y1="50" x2="50" y2="43" stroke="#FFB74D" stroke-width="2" />
    <line x1="50" y1="50" x2="56" y2="50" stroke="#FFB74D" stroke-width="2" />

    <text x="90" y="45" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">평소 식사 시간</text>
    <text x="90" y="70" font-family="SF Pro Display" font-size="14" fill="#608a62">식사 시간 리마인더를 보내드려요</text>

    <!-- Time Pickers -->
    <!-- Breakfast -->
    <g transform="translate(20, 100)">
      <rect width="295" height="44" rx="12" fill="#f5f8f6" />
      <circle cx="35" cy="22" r="16" fill="#FFB74D" />
      <text x="35" y="27" text-anchor="middle" font-size="16">🌅</text>
      <text x="65" y="27" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">아침</text>
      <text x="265" y="27" text-anchor="end" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#0bc911">08:00</text>
      <path d="M275 17 L280 22 L275 27" stroke="#608a62" stroke-width="2" fill="none" />
    </g>

    <!-- Lunch -->
    <g transform="translate(20, 155)">
      <rect width="295" height="44" rx="12" fill="#f5f8f6" />
      <circle cx="35" cy="22" r="16" fill="#4DB6AC" />
      <text x="35" y="27" text-anchor="middle" font-size="16">☀️</text>
      <text x="65" y="27" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">점심</text>
      <text x="265" y="27" text-anchor="end" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#0bc911">12:00</text>
      <path d="M275 17 L280 22 L275 27" stroke="#608a62" stroke-width="2" fill="none" />
    </g>

    <!-- Dinner -->
    <g transform="translate(20, 210)">
      <rect width="295" height="44" rx="12" fill="#f5f8f6" />
      <circle cx="35" cy="22" r="16" fill="#7986CB" />
      <text x="35" y="27" text-anchor="middle" font-size="16">🌙</text>
      <text x="65" y="27" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">저녁</text>
      <text x="265" y="27" text-anchor="end" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#0bc911">19:00</text>
      <path d="M275 17 L280 22 L275 27" stroke="#608a62" stroke-width="2" fill="none" />
    </g>
  </g>

  <!-- Later Button -->
  <text x="187.5" y="610" text-anchor="middle" font-family="SF Pro Display" font-size="14" fill="#608a62">나중에 하기</text>

  <!-- Start Button -->
  <g transform="translate(30, 640)">
    <rect width="315" height="56" rx="28" fill="url(#primaryGradient)" />
    <text x="157.5" y="35" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="600" fill="#ffffff">MyMeal 시작하기</text>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
