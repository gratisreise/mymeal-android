<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Header -->
  <text x="30" y="85" font-family="SF Pro Display" font-size="28" font-weight="700" fill="#111811">인사이트</text>

  <!-- Tabs -->
  <g transform="translate(0, 110)">
    <rect width="375" height="50" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <rect x="5" y="5" width="85" height="40" rx="12" fill="#0df214" opacity="0.15" />
    <text x="47.5" y="30" text-anchor="middle" font-family="SF Pro Display" font-size="13" font-weight="600" fill="#0bc911">베스트</text>

    <text x="155" y="30" text-anchor="middle" font-family="SF Pro Display" font-size="13" fill="#608a62">워스트</text>
    <text x="240" y="30" text-anchor="middle" font-family="SF Pro Display" font-size="13" fill="#608a62">내 패턴</text>
    <text x="320" y="30" text-anchor="middle" font-family="SF Pro Display" font-size="13" fill="#608a62">트렌드</text>
  </g>

  <!-- Empty State -->
  <g transform="translate(187.5, 350)">
    <!-- Background Circle -->
    <circle cx="0" cy="0" r="90" fill="#4cae4f" opacity="0.1" />

    <!-- Chart/Insight Icon -->
    <rect x="-50" y="-40" width="100" height="80" rx="16" fill="url(#primaryGradient)" opacity="0.8" />
    <g transform="translate(-30, 0)">
      <!-- Bar Chart -->
      <rect x="0" y="-10" width="15" height="30" rx="4" fill="#ffffff" opacity="0.5" />
      <rect x="20" y="-25" width="15" height="45" rx="4" fill="#ffffff" opacity="0.7" />
      <rect x="40" y="-35" width="15" height="55" rx="4" fill="#ffffff" />
    </g>

    <!-- Sparkles -->
    <text x="60" y="-50" font-size="20">✨</text>
  </g>

  <!-- Empty State Message -->
  <text x="187.5" y="500" text-anchor="middle" font-family="SF Pro Display" font-size="20" font-weight="700" fill="#111811">식사 3건 더 기록하면</text>
  <text x="187.5" y="530" text-anchor="middle" font-family="SF Pro Display" font-size="20" font-weight="700" fill="#111811">첫 인사이트가 생성돼요</text>

  <!-- Progress Bar -->
  <g transform="translate(50, 570)">
    <text x="0" y="0" font-family="SF Pro Display" font-size="14" fill="#608a62">진행률</text>
    <text x="275" y="0" text-anchor="end" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#0bc911">0 / 3</text>

    <!-- Track -->
    <rect y="15" width="275" height="8" rx="4" fill="#e5e7eb" />
    <!-- Progress -->
    <rect y="15" width="90" height="8" rx="4" fill="#0df214" />

    <!-- Meal Icons -->
    <g transform="translate(0, 40)">
      <circle cx="0" cy="0" r="14" fill="#0df214" />
      <text x="0" y="5" text-anchor="middle" font-size="14">🌅</text>

      <circle cx="40" cy="0" r="14" fill="#e5e7eb" />
      <text x="40" y="5" text-anchor="middle" font-size="14">☀️</text>

      <circle cx="80" cy="0" r="14" fill="#e5e7eb" />
      <text x="80" y="5" text-anchor="middle" font-size="14">🌙</text>
    </g>
  </g>

  <!-- Bottom Navigation -->
  <g transform="translate(0, 712)">
    <rect width="375" height="100" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Home -->
    <g transform="translate(40, 25)">
      <text x="20" y="20" text-anchor="middle" font-size="20" opacity="0.5">🏠</text>
      <text x="20" y="45" text-anchor="middle" font-family="SF Pro Display" font-size="10" fill="#608a62">홈</text>
    </g>

    <!-- Insights - Active -->
    <g transform="translate(110, 25)">
      <circle cx="20" cy="15" r="18" fill="#0df214" opacity="0.15" />
      <text x="20" y="20" text-anchor="middle" font-size="20">💡</text>
      <text x="20" y="45" text-anchor="middle" font-family="SF Pro Display" font-size="10" font-weight="600" fill="#0bc911">인사이트</text>
    </g>

    <!-- FAB Add Button -->
    <g transform="translate(187.5, -20)">
      <circle cx="0" cy="0" r="32" fill="url(#primaryGradient)" />
      <line x1="-12" y1="0" x2="12" y2="0" stroke="#ffffff" stroke-width="3" />
      <line x1="0" y1="-12" x2="0" y2="12" stroke="#ffffff" stroke-width="3" />
    </g>

    <!-- Journal -->
    <g transform="translate(220, 25)">
      <text x="20" y="20" text-anchor="middle" font-size="20" opacity="0.5">📖</text>
      <text x="20" y="45" text-anchor="middle" font-family="SF Pro Display" font-size="10" fill="#608a62">저널</text>
    </g>

    <!-- Profile -->
    <g transform="translate(290, 25)">
      <text x="20" y="20" text-anchor="middle" font-size="20" opacity="0.5">👤</text>
      <text x="20" y="45" text-anchor="middle" font-family="SF Pro Display" font-size="10" fill="#608a62">프로필</text>
    </g>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
