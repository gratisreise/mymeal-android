<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Header -->
  <g transform="translate(0, 60)">
    <!-- Back Button -->
    <path d="M35 20 L40 15 L40 25 Z" fill="#111811" />

    <text x="187.5" y="25" text-anchor="middle" font-family="SF Pro Display" font-size="20" font-weight="700" fill="#111811">2월 12일 수요일</text>
  </g>

  <!-- Daily Stats -->
  <g transform="translate(20, 110)">
    <rect width="335" height="70" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <g transform="translate(25, 25)">
      <text x="0" y="0" font-family="SF Pro Display" font-size="24" font-weight="700" fill="#111811">3</text>
      <text x="0" y="20" font-family="SF Pro Display" font-size="12" fill="#608a62">식사</text>
    </g>

    <line x1="113" y1="15" x2="113" y2="55" stroke="#e5e7eb" stroke-width="1" />

    <g transform="translate(138, 25)">
      <text x="0" y="0" text-anchor="middle" font-size="28">😊</text>
      <text x="0" y="20" text-anchor="middle" font-family="SF Pro Display" font-size="12" fill="#608a62">평균</text>
    </g>

    <line x1="223" y1="15" x2="223" y2="55" stroke="#e5e7eb" stroke-width="1" />

    <g transform="translate(248, 25)">
      <text x="0" y="0" font-family="SF Pro Display" font-size="24" font-weight="700" fill="#0df214">92</text>
      <text x="0" y="20" font-family="SF Pro Display" font-size="12" fill="#608a62">점수</text>
    </g>
  </g>

  <!-- Timeline Section -->
  <text x="30" y="220" font-family="SF Pro Display" font-size="18" font-weight="700" fill="#111811">시간별 기록</text>

  <!-- Meal Card 1 - Lunch -->
  <g transform="translate(20, 240)">
    <rect width="335" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Time Badge -->
    <rect x="15" y="15" width="55" height="24" rx="8" fill="#4DB6AC" opacity="0.2" />
    <text x="42.5" y="32" text-anchor="middle" font-family="SF Pro Display" font-size="12" font-weight="600" fill="#4DB6AC">12:30</text>

    <!-- Photo -->
    <rect x="80" y="15" width="60" height="60" rx="12" fill="#4DB6AC" opacity="0.2" />
    <text x="110" y="55" text-anchor="middle" font-size="24">🍱</text>

    <!-- Info -->
    <g transform="translate(155, 40)">
      <text x="0" y="0" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">돈까스 정식</text>
      <text x="0" y="22" font-family="SF Pro Display" font-size="13" fill="#608a62">점심 • 650kcal</text>
    </g>

    <!-- Reaction -->
    <g transform="translate(280, 35)">
      <rect x="0" y="0" width="45" height="22" rx="8" fill="#FFC107" opacity="0.2" />
      <text x="22.5" y="16" text-anchor="middle" font-size="14">😌</text>
    </g>

    <!-- Action Buttons -->
    <g transform="translate(155, 75)">
      <text x="0" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">수정</text>
      <text x="40" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">•</text>
      <text x="55" y="15" font-family="SF Pro Display" font-size="12" fill="#FF5252">삭제</text>
    </g>
  </g>

  <!-- Meal Card 2 - Breakfast -->
  <g transform="translate(20, 365)">
    <rect width="335" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Time Badge -->
    <rect x="15" y="15" width="55" height="24" rx="8" fill="#FFB74D" opacity="0.2" />
    <text x="42.5" y="32" text-anchor="middle" font-family="SF Pro Display" font-size="12" font-weight="600" fill="#FFB74D">08:15</text>

    <!-- Photo -->
    <rect x="80" y="15" width="60" height="60" rx="12" fill="#FFB74D" opacity="0.2" />
    <text x="110" y="55" text-anchor="middle" font-size="24">🥣</text>

    <!-- Info -->
    <g transform="translate(155, 40)">
      <text x="0" y="0" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">오트밀와 계란후라이</text>
      <text x="0" y="22" font-family="SF Pro Display" font-size="13" fill="#608a62">아침 • 380kcal</text>
    </g>

    <!-- Reaction -->
    <g transform="translate(280, 35)">
      <rect x="0" y="0" width="45" height="22" rx="8" fill="#0df214" opacity="0.2" />
      <text x="22.5" y="16" text-anchor="middle" font-size="14">😊</text>
    </g>

    <!-- Action Buttons -->
    <g transform="translate(155, 75)">
      <text x="0" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">수정</text>
      <text x="40" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">•</text>
      <text x="55" y="15" font-family="SF Pro Display" font-size="12" fill="#FF5252">삭제</text>
    </g>
  </g>

  <!-- Meal Card 3 - Snack -->
  <g transform="translate(20, 490)">
    <rect width="335" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />

    <!-- Time Badge -->
    <rect x="15" y="15" width="55" height="24" rx="8" fill="#BA68C8" opacity="0.2" />
    <text x="42.5" y="32" text-anchor="middle" font-family="SF Pro Display" font-size="12" font-weight="600" fill="#BA68C8">15:45</text>

    <!-- Photo -->
    <rect x="80" y="15" width="60" height="60" rx="12" fill="#BA68C8" opacity="0.2" />
    <text x="110" y="55" text-anchor="middle" font-size="24">☕</text>

    <!-- Info -->
    <g transform="translate(155, 40)">
      <text x="0" y="0" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#111811">아메리카노</text>
      <text x="0" y="22" font-family="SF Pro Display" font-size="13" fill="#608a62">간식 • 10kcal</text>
    </g>

    <!-- No Reaction -->
    <g transform="translate(280, 35)">
      <rect x="0" y="0" width="45" height="22" rx="8" fill="#e5e7eb" />
      <text x="22.5" y="16" text-anchor="middle" font-family="SF Pro Display" font-size="10" fill="#608a62">미기록</text>
    </g>

    <!-- Action Buttons -->
    <g transform="translate(155, 75)">
      <text x="0" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">수정</text>
      <text x="40" y="15" font-family="SF Pro Display" font-size="12" fill="#608a62">•</text>
      <text x="55" y="15" font-family="SF Pro Display" font-size="12" fill="#FF5252">삭제</text>
    </g>
  </g>

  <!-- Share Button -->
  <g transform="translate(30, 640)">
    <rect width="315" height="52" rx="26" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <text x="157.5" y="33" text-anchor="middle" font-family="SF Pro Display" font-size="16" fill="#0bc911">📤 날짜 공유하기</text>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
