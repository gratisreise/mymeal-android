<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Lock Screen Background -->
  <rect width="375" height="812" fill="#111811" opacity="0.95" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="transparent" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#ffffff">9:41</text>
  <text x="30" y="52" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#ffffff">2월 12일 수요일</text>
  <circle cx="330" cy="22" r="3" fill="#ffffff" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#ffffff" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#ffffff" />

  <!-- Notification Card - Meal Time Recommendation -->
  <g transform="translate(15, 120)">
    <rect width="345" height="85" rx="16" fill="#ffffff" opacity="0.95" />

    <!-- App Icon -->
    <g transform="translate(15, 15)">
      <circle cx="20" cy="20" r="20" fill="#0df214" />
      <text x="20" y="26" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="700" fill="#ffffff">M</text>
    </g>

    <!-- App Name -->
    <text x="65" y="32" font-family="SF Pro Display" font-size="13" font-weight="600" fill="#111811">MyMeal</text>
    <text x="325" y="32" text-anchor="end" font-family="SF Pro Display" font-size="13" fill="#608a62">지금</text>

    <!-- Message -->
    <text x="65" y="55" font-family="SF Pro Display" font-size="15" fill="#111811">🍽️ 점심 추천: 그린 샐러드</text>
    <text x="65" y="75" font-family="SF Pro Display" font-size="14" fill="#608a62">비슷한 음식 먹었을 때 컨디션이 좋았어요</text>
  </g>

  <!-- Notification Card - After Meal Survey -->
  <g transform="translate(15, 220)">
    <rect width="345" height="85" rx="16" fill="#ffffff" opacity="0.95" />

    <!-- App Icon -->
    <g transform="translate(15, 15)">
      <circle cx="20" cy="20" r="20" fill="#0df214" />
      <text x="20" y="26" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="700" fill="#ffffff">M</text>
    </g>

    <!-- App Name -->
    <text x="65" y="32" font-family="SF Pro Display" font-size="13" font-weight="600" fill="#111811">MyMeal</text>
    <text x="325" y="32" text-anchor="end" font-family="SF Pro Display" font-size="13" fill="#608a62">5분 전</text>

    <!-- Message -->
    <text x="65" y="55" font-family="SF Pro Display" font-size="15" fill="#111811">📍 식후 컨디션 체크</text>
    <text x="65" y="75" font-family="SF Pro Display" font-size="14" fill="#608a62">지금 어떤 상태인지 알려주세요</text>
  </g>

  <!-- Lock Screen Actions -->
  <g transform="translate(0, 700)">
    <!-- Swipe to unlock hint -->
    <text x="187.5" y="30" text-anchor="middle" font-family="SF Pro Display" font-size="16" fill="#ffffff">위로 밀어서 잠금해제</text>

    <!-- Actions -->
    <rect x="15" y="50" width="165" height="50" rx="12" fill="#ffffff" opacity="0.2" />
    <text x="97.5" y="80" text-anchor="middle" font-family="SF Pro Display" font-size="16" fill="#ffffff">지우기</text>

    <rect x="195" y="50" width="165" height="50" rx="12" fill="#0bc911" />
    <text x="277.5" y="80" text-anchor="middle" font-family="SF Pro Display" font-size="16" font-weight="600" fill="#ffffff">열기</text>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#ffffff" />
</svg>
