<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
    <clipPath id="screenClip">
      <rect width="375" height="812" rx="40" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Skip Button -->
  <text x="335" y="70" text-anchor="end" font-family="SF Pro Display" font-size="16" fill="#608a62">건너뛰기</text>

  <!-- Illustration -->
  <g transform="translate(187.5, 280)">
    <!-- Camera Icon -->
    <circle cx="0" cy="-20" r="80" fill="#4cae4f" opacity="0.2" />
    <rect x="-60" y="-60" width="120" height="80" rx="20" fill="url(#primaryGradient)" />
    <rect x="-50" y="-50" width="100" height="60" rx="10" fill="#ffffff" />
    <circle cx="0" cy="-20" r="15" fill="#f5f8f6" />
    <circle cx="0" cy="-20" r="8" fill="#4cae4f" />
    <circle cx="0" cy="-20" r="12" stroke="#0bc911" stroke-width="2" fill="none" />
    <rect x="-20" y="25" width="40" height="12" rx="6" fill="#ffffff" />
  </g>

  <!-- Text Content -->
  <text x="187.5" y="420" text-anchor="middle" font-family="SF Pro Display" font-size="28" font-weight="700" fill="#111811">음식 사진을 찍으세요</text>
  <text x="187.5" y="460" text-anchor="middle" font-family="SF Pro Display" font-size="18" fill="#608a62">
    <tspan x="187.5" dy="0">사진 한 장으로</tspan>
    <tspan x="187.5" dy="28">간편하게 식단을 기록해요</tspan>
  </text>

  <!-- Page Indicators -->
  <g transform="translate(187.5, 620)">
    <circle cx="-40" cy="0" r="6" fill="#0df214" />
    <circle cx="0" cy="0" r="6" fill="#e5e7eb" />
    <circle cx="40" cy="0" r="6" fill="#e5e7eb" />
  </g>

  <!-- Next Button -->
  <g transform="translate(30, 680)">
    <rect width="315" height="56" rx="28" fill="url(#primaryGradient)" />
    <text x="157.5" y="35" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="600" fill="#ffffff">다음</text>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
