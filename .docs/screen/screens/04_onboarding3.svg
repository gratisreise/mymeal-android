<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Illustration -->
  <g transform="translate(187.5, 280)">
    <!-- Plate with healthy food -->
    <circle cx="0" cy="-20" r="80" fill="#4cae4f" opacity="0.2" />
    <circle cx="0" cy="-20" r="55" fill="url(#primaryGradient)" opacity="0.3" />
    <circle cx="0" cy="-20" r="45" fill="#ffffff" stroke="#0bc911" stroke-width="3" />

    <!-- Food items -->
    <circle cx="-15" cy="-30" r="12" fill="#FFB74D" />
    <circle cx="15" cy="-25" r="10" fill="#4DB6AC" />
    <circle cx="0" cy="-5" r="14" fill="#7986CB" />
    <circle cx="-20" cy="5" r="8" fill="#0df214" />
    <circle cx="18" cy="0" r="9" fill="#BA68C8" />

    <!-- Stars -->
    <text x="50" y="-50" font-size="16">⭐</text>
    <text x="-55" y="-10" font-size="14">✨</text>
  </g>

  <!-- Text Content -->
  <text x="187.5" y="420" text-anchor="middle" font-family="SF Pro Display" font-size="28" font-weight="700" fill="#111811">내 몸에 맞는 식단을</text>
  <text x="187.5" y="455" text-anchor="middle" font-family="SF Pro Display" font-size="28" font-weight="700" fill="#111811">추천받으세요</text>
  <text x="187.5" y="500" text-anchor="middle" font-family="SF Pro Display" font-size="18" fill="#608a62">
    <tspan x="187.5" dy="0">데이터가 쌓이면</tspan>
    <tspan x="187.5" dy="28">개인 맞춤 식단을 추천드려요</tspan>
  </text>

  <!-- Page Indicators -->
  <g transform="translate(187.5, 620)">
    <circle cx="-40" cy="0" r="6" fill="#e5e7eb" />
    <circle cx="0" cy="0" r="6" fill="#e5e7eb" />
    <circle cx="40" cy="0" r="6" fill="#0df214" />
  </g>

  <!-- Start Button -->
  <g transform="translate(30, 680)">
    <rect width="315" height="56" rx="28" fill="url(#primaryGradient)" />
    <text x="157.5" y="35" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="600" fill="#ffffff">시작하기</text>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
