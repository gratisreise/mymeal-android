<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Camera Viewfinder Background -->
  <rect width="375" height="812" fill="#1a1a1a" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#111811" opacity="0.8" />
  <text x="30" y="28" font-family="SF Pro Display" font-size="14" font-weight="600" fill="#ffffff">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#ffffff" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#ffffff" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#ffffff" />

  <!-- Top Controls -->
  <g transform="translate(0, 60)">
    <!-- Close Button -->
    <g transform="translate(30, 10)">
      <circle cx="18" cy="18" r="18" fill="#111811" opacity="0.6" />
      <line x1="13" y1="13" x2="23" y2="23" stroke="#ffffff" stroke-width="2" />
      <line x1="23" y1="13" x2="13" y2="23" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- Title -->
    <text x="187.5" y="35" text-anchor="middle" font-family="SF Pro Display" font-size="18" font-weight="600" fill="#ffffff">점심 식사 인증하기</text>

    <!-- Flash Button -->
    <g transform="translate(310, 10)">
      <circle cx="18" cy="18" r="18" fill="#111811" opacity="0.6" />
      <path d="M18 10 L16 14 L12 14 L15 17 L14 21 L18 18 L22 21 L21 17 L24 14 L20 14 Z"
            stroke="#ffffff" stroke-width="1.5" fill="none" />
    </g>
  </g>

  <!-- Camera Preview Area -->
  <g transform="translate(20, 110)">
    <!-- Preview Frame -->
    <rect width="335" height="400" rx="20" fill="#2a2a2a" stroke="#444" stroke-width="1" stroke-dasharray="8 8" />

    <!-- Placeholder Camera View -->
    <rect x="50" y="50" width="235" height="300" rx="16" fill="#3a3a3a" />
    <text x="167.5" y="190" text-anchor="middle" font-size="48" opacity="0.3">📷</text>
    <text x="167.5" y="230" text-anchor="middle" font-family="SF Pro Display" font-size="14" fill="#888">식사를 찍어주세요</text>

    <!-- Corner Guides -->
    <path d="M50 80 L50 50 L80 50" stroke="#0df214" stroke-width="3" fill="none" />
    <path d="M285 80 L285 50 L255 50" stroke="#0df214" stroke-width="3" fill="none" />
    <path d="M50 320 L50 350 L80 350" stroke="#0df214" stroke-width="3" fill="none" />
    <path d="M285 320 L285 350 L255 350" stroke="#0df214" stroke-width="3" fill="none" />
  </g>

  <!-- Meal Type Tabs -->
  <g transform="translate(20, 540)">
    <rect width="335" height="50" rx="16" fill="#111811" opacity="0.6" />

    <!-- Breakfast -->
    <g transform="translate(10, 5)">
      <circle cx="20" cy="20" r="16" fill="#e5e7eb" />
      <text x="20" y="25" text-anchor="middle" font-size="16">🌅</text>
    </g>

    <!-- Lunch - Active -->
    <g transform="translate(85, 5)">
      <circle cx="20" cy="20" r="16" fill="#4DB6AC" />
      <text x="20" y="25" text-anchor="middle" font-size="16">☀️</text>
    </g>

    <!-- Dinner -->
    <g transform="translate(160, 5)">
      <circle cx="20" cy="20" r="16" fill="#e5e7eb" />
      <text x="20" y="25" text-anchor="middle" font-size="16">🌙</text>
    </g>

    <!-- Snack -->
    <g transform="translate(235, 5)">
      <circle cx="20" cy="20" r="16" fill="#e5e7eb" />
      <text x="20" y="25" text-anchor="middle" font-size="16">🍪</text>
    </g>
  </g>

  <!-- Bottom Controls -->
  <g transform="translate(0, 620)">
    <!-- Gallery Button -->
    <g transform="translate(40, 40)">
      <rect width="50" height="50" rx="12" fill="#ffffff" opacity="0.2" />
      <rect x="12" y="12" width="26" height="26" rx="4" fill="#ffffff" />
      <circle cx="30" cy="28" r="4" fill="#4DB6AC" />
    </g>

    <!-- Camera Toggle -->
    <g transform="translate(150, 40)">
      <circle cx="25" cy="25" r="22" fill="#ffffff" opacity="0.2" />
      <path d="M15 20 Q25 15 35 20 L35 30 Q25 35 15 30 Z" fill="#ffffff" />
      <circle cx="25" cy="25" r="8" fill="#ffffff" />
    </g>

    <!-- Shutter Button -->
    <g transform="translate(235, 25)">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5" />
      <circle cx="50" cy="50" r="40" fill="#ffffff" />
      <circle cx="50" cy="50" r="35" fill="url(#primaryGradient)" />
    </g>
  </g>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#ffffff" />
</svg>
