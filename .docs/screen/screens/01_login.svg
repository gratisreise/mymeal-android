<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
    <clipPath id="screenClip">
      <rect width="375" height="812" rx="40" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />
  <rect width="375" height="812" rx="40" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />
  <path d="M352 26 L352 28 L358 24 L352 20 L352 22" fill="#111811" />

  <!-- Logo Section -->
  <g transform="translate(187.5, 120)">
    <circle cx="0" cy="0" r="40" fill="url(#primaryGradient)" />
    <text x="0" y="8" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="28" font-weight="700" fill="#ffffff">M</text>
  </g>
  <text x="187.5" y="200" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="32" font-weight="700" fill="#111811">MyMeal</text>
  <text x="187.5" y="235" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" fill="#608a62">건강한 식단을 기록하고 관리해요</text>

  <!-- Social Login Buttons -->
  <!-- Kakao -->
  <g transform="translate(30, 290)">
    <rect width="315" height="52" rx="26" fill="#FEE500" />
    <text x="157.5" y="33" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#111811">카카오로 시작하기</text>
  </g>

  <!-- Naver -->
  <g transform="translate(30, 360)">
    <rect width="315" height="52" rx="26" fill="#03C75A" />
    <text x="157.5" y="33" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#ffffff">NAVER로 시작하기</text>
  </g>

  <!-- Google -->
  <g transform="translate(30, 430)">
    <rect width="315" height="52" rx="26" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <text x="157.5" y="33" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#111811">Google로 시작하기</text>
  </g>

  <!-- Divider -->
  <g transform="translate(30, 510)">
    <line x1="0" y1="12" x2="120" y2="12" stroke="#e5e7eb" stroke-width="1" />
    <text x="157.5" y="17" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#608a62">또는</text>
    <line x1="195" y1="12" x2="315" y2="12" stroke="#e5e7eb" stroke-width="1" />
  </g>

  <!-- Email Input -->
  <g transform="translate(30, 550)">
    <rect width="315" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" fill="#6b7280">이메일</text>
  </g>

  <!-- Password Input -->
  <g transform="translate(30, 615)">
    <rect width="315" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" fill="#6b7280">비밀번호</text>
    <circle cx="300" cy="26" r="3" fill="#6b7280" />
    <circle cx="290" cy="26" r="3" fill="#6b7280" />
    <circle cx="280" cy="26" r="3" fill="#6b7280" />
  </g>

  <!-- Login Button -->
  <g transform="translate(30, 685)">
    <rect width="315" height="52" rx="26" fill="url(#primaryGradient)" />
    <text x="157.5" y="33" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#ffffff">로그인</text>
  </g>

  <!-- Signup Link -->
  <text x="187.5" y="765" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#608a62">
    계정이 없으신가요? <tspan fill="#0bc911" font-weight="600">회원가입</tspan>
  </text>

  <!-- Home Indicator -->
  <rect x="120" y="798" width="135" height="5" rx="2.5" fill="#111811" />
</svg>
