<?xml version="1.0" encoding="UTF-8"?>
<svg width="375" height="812" viewBox="0 0 375 812" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0df214;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0bc911;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f5f8f6" />

  <!-- Status Bar -->
  <rect y="0" width="375" height="44" fill="#f5f8f6" />
  <text x="30" y="28" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" font-weight="600" fill="#111811">9:41</text>
  <circle cx="330" cy="22" r="3" fill="#111811" />
  <rect x="338" y="16" width="18" height="10" rx="2" stroke="#111811" stroke-width="1.5" fill="none" />
  <rect x="340" y="18" width="14" height="6" rx="1" fill="#111811" />

  <!-- Header -->
  <g transform="translate(0, 60)">
    <!-- Back Button -->
    <circle cx="30" cy="22" r="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
    <path d="M36 22 L28 22 M30 18 L26 22 L30 26" stroke="#111811" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Title -->
    <text x="187.5" y="28" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="20" font-weight="700" fill="#111811">회원가입</text>
  </g>

  <!-- Logo -->
  <g transform="translate(187.5, 130)">
    <text x="0" y="0" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="32" font-weight="700" fill="#0bc911">MyMeal</text>
    <text x="0" y="25" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#608a62">건강한 식단을 기록해보세요</text>
  </g>

  <!-- Form Fields -->
  <g transform="translate(20, 190)">
    <!-- Name Field -->
    <g transform="translate(0, 0)">
      <rect width="335" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
      <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="15" fill="#608a62">이름</text>
    </g>

    <!-- Email Field -->
    <g transform="translate(0, 64)">
      <rect width="335" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
      <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="15" fill="#608a62">이메일</text>
    </g>

    <!-- Password Field -->
    <g transform="translate(0, 128)">
      <rect width="335" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
      <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="15" fill="#608a62">비밀번호 (8자 이상)</text>
      <!-- Eye Icon -->
      <circle cx="310" cy="26" r="10" fill="#e5e7eb" opacity="0.5" />
    </g>

    <!-- Password Confirm Field -->
    <g transform="translate(0, 192)">
      <rect width="335" height="52" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
      <text x="16" y="32" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="15" fill="#608a62">비밀번호 확인</text>
    </g>
  </g>

  <!-- Terms Agreement -->
  <g transform="translate(20, 460)">
    <!-- Select All -->
    <g transform="translate(0, 0)">
      <rect width="20" height="20" rx="4" fill="#0df214" />
      <path d="M5 10 L8 13 L15 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <text x="30" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="15" font-weight="600" fill="#111811">전체 동의</text>
    </g>

    <!-- Divider Line -->
    <line x1="0" y1="30" x2="335" y2="30" stroke="#e5e7eb" stroke-width="1" />

    <!-- Terms of Service -->
    <g transform="translate(0, 45)">
      <rect width="20" height="20" rx="4" fill="#0df214" />
      <path d="M5 10 L8 13 L15 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <text x="30" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#111811">이용약관 동의</text>
      <text x="280" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="12" fill="#FF5252">(필수)</text>
    </g>

    <!-- Privacy Policy -->
    <g transform="translate(0, 80)">
      <rect width="20" height="20" rx="4" fill="#0df214" />
      <path d="M5 10 L8 13 L15 6" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
      <text x="30" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#111811">개인정보처리방침 동의</text>
      <text x="275" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="12" fill="#FF5252">(필수)</text>
    </g>

    <!-- Marketing (Optional) -->
    <g transform="translate(0, 115)">
      <rect width="20" height="20" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" />
      <text x="30" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="14" fill="#111811">마케팅 정보 수신 동의</text>
      <text x="275" y="15" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="12" fill="#608a62">(선택)</text>
    </g>
  </g>

  <!-- Sign Up Button -->
  <g transform="translate(20, 640)">
    <rect width="335" height="54" rx="27" fill="url(#primaryGradient)" />
    <text x="167.5" y="34" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="16" font-weight="600" fill="#ffffff">가입하기</text>
  </g>

  <!-- Login Link -->
  <text x="187.5" y="805" text-anchor="middle" font-family="Apple SD Gothic Neo, SF Pro Display, sans-serif" font-size="13" fill="#608a62">이미 계정이 있으신가요? <tspan fill="#0bc911" font-weight="600">로그인</tspan></text>

  <!-- Home Indicator -->
  <rect x="120" y="806" width="135" height="5" rx="2.5" fill="#111811" opacity="0.3" />
</svg>
