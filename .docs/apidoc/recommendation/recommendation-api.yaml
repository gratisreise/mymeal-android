openapi: 3.0.3
info:
  title: MyMeal Recommendation API
  version: 1.0.0
  description: |
    MyMeal 서비스의 식단 추천 API 명세서입니다.

    이 API는 다음 기능을 제공합니다:
    - 개인화된 식단 추천 목록 조회
    - 식사 시간 기반 추천 스케줄 조회

    **추천 시스템 구조:**
    1. **1차 추천 (AI 배치 추천):**
       - 매일 새벽 1시 Spring Batch 작업으로 생성
       - AI가 과거 식사 데이터 분석 기반 개인 맞춤 추천
       - 당일 유효한 추천 목록 제공

    2. **2차 추천 (규칙 기반 폴백):**
       - 배치 추천이 없는 경우 규칙 기반 추천 제공
       - 최근 30일간 GOOD 등급 식사 기반 추천
       - 평균 반응 점수 높은 순 정렬

  contact:
    name: MyMeal API Support
    email: support@mymeal-server.com

  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.mymeal-server.com
    description: Production server

tags:
  - name: Recommendations
    description: 식단 추천 API

security:
  - BearerAuth: []

paths:
  /api/v1/recommendations:
    get:
      tags:
        - Recommendations
      summary: 식단 추천 조회
      description: |
        과거 식사 반응을 기반으로 개인화된 식단을 추천합니다.

        **추천 우선순위:**
        1. **AI 배치 추천 (1차):**
           - 매일 새벽 1시 생성된 AI 추천
           - 당일 유효하거나 아직 발송되지 않은 추천
           - `menuDetails` JSON에서 mealName, reason 추출

        2. **규칙 기반 추천 (2차 폴백):**
           - 배치 추천이 없는 경우 실행
           - 최근 30일간 GOOD 등급 식사 필터링
           - 평균 반응 점수 높은 순 정렬
           - 과거 식사의 mealName, 평균 점수 제공

        **파라미터:**
        - `mealType`: BREAKFAST, LUNCH, DINNER, SNACK (선택 사항)
        - `limit`: 1~10 사이 추천 수량 (기본값 3)
      operationId: getRecommendations
      security:
        - BearerAuth: []
      parameters:
        - name: mealType
          in: query
          description: |
            식사 유형 필터

            - null인 경우 전체 식사 유형 추천
            - 지정 시 해당 유형만 추천
          required: false
          schema:
            type: string
            enum: [BREAKFAST, LUNCH, DINNER, SNACK]
          example: LUNCH
        - name: limit
          in: query
          description: |
            추천 수량 (1~10)

            기본값: 3
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
          example: 5
      responses:
        '200':
          description: 식단 추천 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_RecommendationList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecommendationResponse'
              examples:
                aiBatchRecommendations:
                  summary: AI 배치 추천 (1차)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      - mealName: "그릴드 닭가슴살 샐러드"
                        reason: "최근 일주일간 점심에 닭가슴살 요리 후 소화력이 좋았습니다. 오늘도 가볍게 즐기세요."
                        matchingTags: []
                        averageScore: null
                        referenceMealId: null
                      - mealName: "현미밥과 된장찌개"
                        reason: "과거 30일간 저녁 식사 중 된장찌개의 평균 반응 점수가 가장 높았습니다."
                        matchingTags: []
                        averageScore: null
                        referenceMealId: null
                      - mealName: "브로콜리 오븐구이"
                        reason: "브로콜리 섭취 후 에너지 레벨이 지속적으로 높게 유지되었습니다."
                        matchingTags: []
                        averageScore: null
                        referenceMealId: null
                ruleBasedFallback:
                  summary: 규칙 기반 추천 (2차 폴백)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      - mealName: "그릴드 연어 스테이크"
                        reason: "과거 좋은 반응이었습니다"
                        matchingTags: []
                        averageScore: 4.5
                        referenceMealId: 123
                      - mealName: "퀴노아 볼"
                        reason: "과거 좋은 반응이었습니다"
                        matchingTags: []
                        averageScore: 4.3
                        referenceMealId: 98
                      - mealName: "가지 샐러드"
                        reason: "과거 좋은 반응이었습니다"
                        matchingTags: []
                        averageScore: 4.1
                        referenceMealId: 87
                noRecommendations:
                  summary: 추천 데이터 없음
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data: []
        '400':
          description: 유효성 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                limitOutOfRange:
                  summary: limit 파라미터 범위 초과
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: VAL_001
                      message: "limit 파라미터는 1~10 사이여야 합니다."
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notLoggedIn:
                  summary: 로그인되지 않음
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_008
                      message: "로그인이 필요한 서비스입니다."
                invalidToken:
                  summary: 유효하지 않은 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_003
                      message: "유효하지 않은 토큰입니다."
                expiredToken:
                  summary: 만료된 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_002
                      message: "액세스 토큰이 만료되었습니다."

  /api/v1/recommendations/schedule:
    get:
      tags:
        - Recommendations
      summary: 추천 스케줄 조회
      description: |
        식사 시간 기반 추천 알림 스케줄을 조회합니다.

        **스케줄 구성:**
        1. **AI 배치 추천 스케줄:**
           - 당일 생성된 배치 추천의 예정 시간 기준
           - `mealType`, `scheduledTime`, `menuDetails`, `pushMessage` 제공

        2. **폴백 스케줄:**
           - 배치 추천이 없는 경우 회원 설정의 식사 시간 기반
           - 각 식사 유형별 단일 추천 제공
           - `MemberSettings`의 breakfastTime, lunchTime, dinnerTime 활용

        **데이터 제공:**
        - 식사 유형 (BREAKFAST, LUNCH, DINNER, SNACK)
        - 추천 시간 (LocalDateTime)
        - 식사명 (mealName)
        - 추천 사유 (reason)
      operationId: getRecommendationSchedule
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 추천 스케줄 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_ScheduleList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecommendationScheduleResponse'
              examples:
                batchSchedule:
                  summary: AI 배치 추천 스케줄
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      - mealType: BREAKFAST
                        recommendedTime: "2025-02-24T08:00:00"
                        mealName: "오트밀과 블루베리"
                        reason: "아침 식사 후 에너지 레벨이 안정적으로 유지됩니다."
                      - mealType: LUNCH
                        recommendedTime: "2025-02-24T12:30:00"
                        mealName: "그릴드 닭가슴살 샐러드"
                        reason: "점심에 가벼운 단백질 섭취 후 소화력이 좋았습니다."
                      - mealType: DINNER
                        recommendedTime: "2025-02-24T19:00:00"
                        mealName: "연어 구이와 구운 채소"
                        reason: "저녁 식사 후 포만감이 오래 지속됩니다."
                fallbackSchedule:
                  summary: 폴백 스케줄 (회원 설정 기반)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      - mealType: BREAKFAST
                        recommendedTime: "2025-02-24T08:00:00"
                        mealName: "그릴드 닭가슴살 샐러드"
                        reason: "최근 일주일간 점심에 닭가슴살 요리 후 소화력이 좋았습니다. 오늘도 가볍게 즐기세요."
                      - mealType: LUNCH
                        recommendedTime: "2025-02-24T12:30:00"
                        mealName: "현미밥과 된장찌개"
                        reason: "건강한 점심 식사를 추천합니다"
                      - mealType: DINNER
                        recommendedTime: "2025-02-24T19:00:00"
                        mealName: "브로콜리 오븐구이"
                        reason: "건강한 저녁 식사를 추천합니다"
                emptySchedule:
                  summary: 스케줄 없음
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data: []
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notLoggedIn:
                  summary: 로그인되지 않음
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_008
                      message: "로그인이 필요한 서비스입니다."
                invalidToken:
                  summary: 유효하지 않은 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_003
                      message: "유효하지 않은 토큰입니다."
                expiredToken:
                  summary: 만료된 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_002
                      message: "액세스 토큰이 만료되었습니다."
        '404':
          description: 회원 설정을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                noSettings:
                  summary: 회원 설정 없음
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: MEMBER_002
                      message: "회원 설정을 찾을 수 없습니다."

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 인증 방식입니다.

        **헤더 형식:**
        ```
        Authorization: Bearer <access_token>
        ```

        **액세스 토큰:**
        - 유효기간: 1시간
        - 헤더에 포함하여 API 호출

  schemas:
    # ========================================
    # Response Schemas
    # ========================================

    RecommendationResponse:
      type: object
      required:
        - mealName
        - reason
        - matchingTags
      properties:
        mealName:
          type: string
          description: |
            추천 식사명

            **AI 배치 추천:**
            - `menuDetails` JSON에서 추출
            - AI가 생성한 개인 맞춤 식단명

            **규칙 기반 추천:**
            - 과거 식사의 mealName
            - 없는 경우 mealType description 사용
          example: "그릴드 닭가슴살 샐러드"
        reason:
          type: string
          description: |
            추천 사유

            **AI 배치 추천:**
            - `menuDetails` JSON에서 추출
            - AI가 생성한 추천 이유

            **규칙 기반 추천:**
            - "과거 좋은 반응이었습니다" 고정값
          example: "최근 일주일간 점심에 닭가슴살 요리 후 소화력이 좋았습니다. 오늘도 가볍게 즐기세요."
        matchingTags:
          type: array
          description: |
            매칭 태그 목록

            현재 빈 배열로 제공 (향후 기능 확장 예정)
          items:
            type: string
          example: []
        averageScore:
          type: number
          format: double
          description: |
            평균 반응 점수

            **AI 배치 추천:**
            - null (과거 데이터 기반 아님)

            **규칙 기반 추천:**
            - 과거 식사의 평균 반응 점수 (1.0 ~ 5.0)
          example: 4.5
          minimum: 1.0
          maximum: 5.0
          nullable: true
        referenceMealId:
          type: integer
          format: int64
          description: |
            참조 식사 ID

            **AI 배치 추천:**
            - null (특정 식사 참조 아님)

            **규칙 기반 추천:**
            - 추천 기반 과거 식사 ID
          example: 123
          nullable: true

    RecommendationScheduleResponse:
      type: object
      required:
        - mealType
        - recommendedTime
        - mealName
        - reason
      properties:
        mealType:
          type: string
          description: |
            식사 유형

            - BREAKFAST: 아침
            - LUNCH: 점심
            - DINNER: 저녁
            - SNACK: 간식
          enum: [BREAKFAST, LUNCH, DINNER, SNACK]
          example: LUNCH
        recommendedTime:
          type: string
          format: date-time
          description: |
            추천 시간

            **AI 배치 추천:**
            - `scheduledTime` 값

            **폴백 스케줄:**
            - `MemberSettings`의 식사 시간
          example: "2025-02-24T12:30:00"
        mealName:
          type: string
          description: |
            추천 식사명

            **AI 배치 추천:**
            - `menuDetails` JSON에서 추출

            **폴백 스케줄:**
            - 단일 추천 API 결과
            - null인 경우 가능
          example: "그릴드 닭가슴살 샐러드"
          nullable: true
        reason:
          type: string
          description: |
            추천 사유

            **AI 배치 추천:**
            - `pushMessage` 값

            **폴백 스케줄:**
            - 단일 추천 API 결과
            - 기본 메시지 사용
          example: "최근 일주일간 점심에 닭가슴살 요리 후 소화력이 좋았습니다. 오늘도 가볍게 즐기세요."

    # ========================================
    # Common Response Schemas
    # ========================================

    BaseResponse:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        timestamp:
          type: string
          format: date-time
          description: 응답 생성 시간
          example: "2025-02-24T10:30:00"

    SuccessResponse_RecommendationList:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              description: 식단 추천 목록
              items:
                $ref: '#/components/schemas/RecommendationResponse'

    SuccessResponse_ScheduleList:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              description: 추천 스케줄 목록
              items:
                $ref: '#/components/schemas/RecommendationScheduleResponse'

    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 에러 코드
          example: AUTH_001
        message:
          type: string
          description: 에러 메시지
          example: "이메일 또는 비밀번호가 올바르지 않습니다."

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - error
          properties:
            success:
              type: boolean
              example: false
            error:
              $ref: '#/components/schemas/ErrorDetail'
