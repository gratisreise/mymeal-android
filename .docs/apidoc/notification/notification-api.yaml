openapi: 3.0.0
info:
  title: MyMeal Notification API
  description: |
    MyMeal 알림 API 명세서

    ## 개요
    알림 기능은 사용자에게 푸시 알림을 전송하고, 알림 내역을 조회/관리합니다.

    ## 기능
    1. 알림 목록 조회 - 페이지네이션된 알림 목록 조회
    2. 단일 알림 읽음 처리 - 특정 알림을 읽음 상태로 변경
    3. 전체 알림 읽음 처리 - 현재 회원의 모든 알림을 읽음 상태로 변경

    ## 알림 유형
    - **RECOMMENDATION**: 식사 추천 알림
    - **REACTION_REMINDER**: 식후 반응 기록 리마인더 알림
    - **MEAL_REMINDER**: 식사 시간 알림
  version: 1.0.0
  contact:
    name: MyMeal Team
    email: api@mymeal.com

servers:
  - url: http://localhost:8080/api/v1
    description: 로컬 개발 환경
  - url: https://api.mymeal.com/api/v1
    description: 프로덕션 환경

tags:
  - name: Notifications
    description: 알림 관리

security:
  - BearerAuth: []

paths:
  /notifications:
    get:
      tags:
        - Notifications
      summary: 알림 목록 조회
      description: |
        현재 로그인한 사용자의 알림 목록을 페이지네이션하여 조회합니다.

        ## 응답 데이터
        - **data**: 알림 객체 리스트 (최신순 정렬)
        - **pagination**: 페이지네이션 정보
        - **unreadCount**: 전체 읽지 않은 알림 수

        ## UI 표시 가이드
        - 알림 리스트 뷰에 카드 형태로 표시
        - 읽지 않은 알림: 강조 표시 (배경색/뱃지)
        - 읽은 알림: 회색 처리 또는 투명도 조절
        - 알림 탭에 읽지 않은 알림 수 뱃지 표시
        - 알림 클릭 시 연관된 화면으로 딥링크 (data 필드 활용)

        ## 딥링크 데이터 예시
        ```json
        {
          "mealId": 123,
          "screen": "meal_detail",
          "recommendationId": 456
        }
        ```
      operationId: getNotifications
      parameters:
        - name: unreadOnly
          in: query
          required: false
          description: 읽지 않은 알림만 필터링 여부
          schema:
            type: boolean
            default: false
          example: false
        - name: page
          in: query
          required: false
          description: 페이지 번호 (0-based)
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: size
          in: query
          required: false
          description: 페이지당 항목 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
      responses:
        '200':
          description: 알림 목록 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/NotificationListResponse'
              examples:
                all_notifications:
                  summary: 전체 알림 조회
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      data:
                        - id: 1
                          type: RECOMMENDATION
                          title: "오늘의 점심 추천"
                          body: "최근 기록을 바탕으로 건강한 점심 메뉴를 추천해드려요."
                          data:
                            mealId: 123
                            screen: "recommendation_detail"
                          isRead: false
                          createdAt: "2025-02-24T11:30:00"
                        - id: 2
                          type: REACTION_REMINDER
                          title: "식후 반응 기록 리마인더"
                          body: "아침 식사 후 30분이 지났어요. 반응을 기록해주세요!"
                          data:
                            mealId: 122
                            screen: "reaction_input"
                          isRead: false
                          createdAt: "2025-02-24T09:00:00"
                        - id: 3
                          type: MEAL_REMINDER
                          title: "점심 시간 알림"
                          body: "설정하신 점심 시간입니다. 건강한 점심 드세요!"
                          data:
                            mealTime: "12:30"
                          isRead: true
                          createdAt: "2025-02-24T08:00:00"
                      pagination:
                        currentPage: 1
                        pageSize: 20
                        totalElements: 45
                        totalPages: 3
                        last: false
                        first: true
                      unreadCount: 12
                unread_only:
                  summary: 읽지 않은 알림만 조회
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      data:
                        - id: 1
                          type: RECOMMENDATION
                          title: "오늘의 점심 추천"
                          body: "최근 기록을 바탕으로 건강한 점심 메뉴를 추천해드려요."
                          data:
                            mealId: 123
                            screen: "recommendation_detail"
                          isRead: false
                          createdAt: "2025-02-24T11:30:00"
                        - id: 2
                          type: REACTION_REMINDER
                          title: "식후 반응 기록 리마인더"
                          body: "아침 식사 후 30분이 지났어요. 반응을 기록해주세요!"
                          data:
                            mealId: 122
                            screen: "reaction_input"
                          isRead: false
                          createdAt: "2025-02-24T09:00:00"
                      pagination:
                        currentPage: 1
                        pageSize: 20
                        totalElements: 12
                        totalPages: 1
                        last: true
                        first: true
                      unreadCount: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    put:
      tags:
        - Notifications
      summary: 단일 알림 읽음 처리
      description: |
        특정 알림을 읽음 상태로 변경합니다.

        ## 비고
        - 본인의 알림만 읽음 처리 가능
        - 이미 읽은 알림을 다시 호출해도 성공 응답
        - 읽음 처리 시 `readAt` 타임스탬프가 자동 설정됨
      operationId: markNotificationAsRead
      parameters:
        - name: id
          in: path
          required: true
          description: 알림 ID
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
          description: 알림 읽음 처리 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
              example:
                success: true
                timestamp: "2025-02-24T12:00:00"
                data: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/read-all:
    put:
      tags:
        - Notifications
      summary: 전체 알림 읽음 처리
      description: |
        현재 회원의 모든 알림을 읽음 상태로 변경합니다.

        ## 비고
        - 읽지 않은 모든 알림이 일괄 처리됨
        - 이미 읽은 알림은 영향 없음
        - 각 알림의 `readAt` 타임스탬프가 현재 시간으로 설정됨

        ## UI 표시 가이드
        - "모두 읽음" 버튼 클릭 시 호출
        - 호출 후 알림 목록 새로고침
        - 읽지 않은 알림 수 뱃지 제거
      operationId: markAllNotificationsAsRead
      responses:
        '200':
          description: 전체 알림 읽음 처리 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        nullable: true
              example:
                success: true
                timestamp: "2025-02-24T12:00:00"
                data: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT 액세스 토큰 (Authorization: Bearer {token})'

  schemas:
    SuccessResponse:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        timestamp:
          type: string
          format: date-time
          description: 응답 시간
          example: "2025-02-24T12:00:00"

    NotificationResponse:
      type: object
      description: 단일 알림 정보
      required:
        - id
        - type
        - title
        - body
        - data
        - isRead
        - createdAt
      properties:
        id:
          type: integer
          description: 알림 ID
          example: 1
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
          description: 알림 제목 (최대 200자)
          maxLength: 200
          example: "오늘의 점심 추천"
        body:
          type: string
          description: 알림 본문 (최대 500자)
          maxLength: 500
          example: "최근 기록을 바탕으로 건강한 점심 메뉴를 추천해드려요."
        data:
          type: object
          description: |-
            딥링크용 JSON 데이터 (연관된 리소스 ID, 화면 정보 등)
            예: {"mealId": 123, "screen": "meal_detail"}
          additionalProperties:
            type: object
          nullable: true
          example:
            mealId: 123
            screen: "recommendation_detail"
        isRead:
          type: boolean
          description: 읽음 여부
          example: false
        createdAt:
          type: string
          format: date-time
          description: 알림 생성 시간
          example: "2025-02-24T11:30:00"

    NotificationType:
      type: string
      description: 알림 유형
      enum:
        - RECOMMENDATION
        - REACTION_REMINDER
        - MEAL_REMINDER
      x-enum-descriptions:
        RECOMMENDATION: 식사 추천 알림
        REACTION_REMINDER: 식후 반응 기록 리마인더
        MEAL_REMINDER: 식사 시간 알림

    NotificationListResponse:
      type: object
      description: 알림 목록 응답
      required:
        - data
        - pagination
        - unreadCount
      properties:
        data:
          type: array
          description: 알림 리스트 (최신순 정렬)
          items:
            $ref: '#/components/schemas/NotificationResponse'
        pagination:
          $ref: '#/components/schemas/Pagination'
        unreadCount:
          type: integer
          description: 전체 읽지 않은 알림 수
          minimum: 0
          example: 12

    Pagination:
      type: object
      description: 페이지네이션 정보
      required:
        - currentPage
        - pageSize
        - totalElements
        - totalPages
        - last
        - first
      properties:
        currentPage:
          type: integer
          description: 현재 페이지 번호 (1-based)
          minimum: 1
          example: 1
        pageSize:
          type: integer
          description: 페이지당 항목 수
          minimum: 1
          example: 20
        totalElements:
          type: integer
          description: 전체 항목 수
          minimum: 0
          example: 45
        totalPages:
          type: integer
          description: 전체 페이지 수
          minimum: 0
          example: 3
        last:
          type: boolean
          description: 마지막 페이지 여부
          example: false
        first:
          type: boolean
          description: 첫 번째 페이지 여부
          example: true

  responses:
    BadRequest:
      description: 잘못된 요청 (파라미터 유효성 검증 실패)
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - timestamp
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: VALIDATION_ERROR
                  message:
                    type: string
                    example: "요청 파라미터가 유효하지 않습니다."
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
              timestamp:
                type: string
                format: date-time
          example:
            success: false
            timestamp: "2025-02-24T12:00:00"
            error:
              code: "VALIDATION_ERROR"
              message: "요청 파라미터가 유효하지 않습니다."
              details:
                size: "size는 1 이상 100 이하여야 합니다."

    Unauthorized:
      description: 인증 실패 (유효하지 않은 토큰)
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - timestamp
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: INVALID_TOKEN
                  message:
                    type: string
                    example: "Invalid or expired token"
                  details:
                    type: object
                    nullable: true
              timestamp:
                type: string
                format: date-time
          example:
            success: false
            timestamp: "2025-02-24T12:00:00"
            error:
              code: "INVALID_TOKEN"
              message: "인증이 만료되었거나 유효하지 않습니다."
              details: null

    NotFound:
      description: 알림 찾을 수 없음 (존재하지 않거나 접근 권한 없음)
      content:
        application/json:
          schema:
            type: object
            required:
              - success
              - error
              - timestamp
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                required:
                  - code
                  - message
                properties:
                  code:
                    type: string
                    example: NOTIFICATION_NOT_FOUND
                  message:
                    type: string
                    example: "알림을 찾을 수 없습니다."
                  details:
                    type: object
                    nullable: true
              timestamp:
                type: string
                format: date-time
          example:
            success: false
            timestamp: "2025-02-24T12:00:00"
            error:
              code: "NOTIFICATION_NOT_FOUND"
              message: "알림을 찾을 수 없거나 접근 권한이 없습니다."
              details: null
