openapi: 3.1.0
info:
  title: MyMeal Reaction API
  description: |
    MyMeal 식후 반응(Reaction) API 명세서

    ## 개요
    식후 반응 기능은 사용자가 식사 후 신체 반응을 기록하고 관리합니다. 사용자는 소화 상태, 포만감, 에너지 레벨을 평가하고, 다양한 증상 여부를 기록할 수 있습니다.

    ## 기능
    1. **식후 반응 생성** - 특정 식사에 대한 식후 반응 기록 (한 식사당 하나의 반응만 허용)
    2. **식후 반응 조회** - 특정 식사의 식후 반응 조회
    3. **식후 반응 수정** - 기존 식후 반응 수정

    ## 비즈니스 로직
    - 한 식사당 하나의 반응만 기록 가능 (이미 존재할 시 409 에러)
    - 종합 점수(overallScore)와 등급(grade)은 서버에서 자동 계산
    - 점수 계산: (소화 + 포만감 + 에너지) ± 증상 페널티
    - 등급 부여: GOOD(70점 이상), NORMAL(50-69점), BAD(50점 미만)

    ## 점수 계산 공식
    ```
    기본 점수 = digestionLevel + fullnessLevel + energyLevel
    페널티 = 속쓰림(-1) + 가스(-0.5) + 배부팅(-0.5) + 두통(-1)
    최종 점수 = max(1, min(5, 기본 점수 + 페널티))
    등급 = GOOD (최종 점수 >= 4) | NORMAL (최종 점수 >= 2.5) | BAD (최종 점수 < 2.5)
    ```

  version: 1.0.0
  contact:
    name: MyMeal Team
    email: api@mymeal.com

servers:
  - url: http://localhost:8080/api/v1
    description: 로컬 개발 환경
  - url: https://api.mymeal.com/api/v1
    description: 프로덕션 환경

tags:
  - name: Reactions
    description: 식후 반응 관리

security:
  - BearerAuth: []

paths:
  # ========================================================================
  # REACTIONS - 식후 반응
  # ========================================================================
  /meals/{mealId}/reactions:
    post:
      tags: [Reactions]
      summary: 식후 반응 생성
      description: |
        특정 식사에 대한 식후 반응을 기록합니다.

        ## 비즈니스 규칙
        - 한 식사당 하나의 반응만 기록 가능
        - 이미 반응이 존재할 경우 409 에러 반환
        - 종합 점수(overallScore)와 등급(grade)은 서버에서 자동 계산

        ## UI 표시 가이드
        - **폼 구성**:
          - 슬라이더: 소화 상태 (1-5, 이모지: 🤢~😊)
          - 슬라이더: 포만감 (1-5, 이모지: 😋~😫)
          - 슬라이더: 에너지 레벨 (1-5, 이모지: 😴⚡)
          - 토글 스위치: 속쓰림 🔥, 가스 💨, 배부팅 🎈, 두통 🤕
          - 텍스트필드: 메모 (선택, 최대 500자)

        - **실시간 피드백**:
          - 점수 계산 결과 미리보기
          - 등급 색상 표시 (GOOD: 초록, NORMAL: 노랑, BAD: 빨강)

        - **제출 후 피드백**:
          - 성공: "식후 반응이 기록되었습니다!"
          - 실패: 각 에러 상황별 메시지 (409: "이미 반응을 기록했습니다")

      operationId: createReaction
      parameters:
        - name: mealId
          in: path
          required: true
          description: 식사 ID
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionCreateRequest'
            examples:
              goodReaction:
                summary: 좋은 반응 (GOOD 등급)
                description: 모든 항목이 높은 점수, 증상 없음
                value:
                  digestionLevel: 5
                  fullnessLevel: 4
                  energyLevel: 5
                  hasHeartburn: false
                  hasGas: false
                  hasBloating: false
                  hasHeadache: false
                  memo: "소화도 잘 되고 에너지도 넘침!"
              normalReaction:
                summary: 보통 반응 (NORMAL 등급)
                description: 중간 점수, 약간의 증상
                value:
                  digestionLevel: 3
                  fullnessLevel: 4
                  energyLevel: 3
                  hasHeartburn: false
                  hasGas: true
                  hasBloating: false
                  hasHeadache: false
                  memo: "약간 배에서 가스가 찬느낌"
              badReaction:
                summary: 나쁜 반응 (BAD 등급)
                description: 낮은 점수, 여러 증상
                value:
                  digestionLevel: 2
                  fullnessLevel: 2
                  energyLevel: 1
                  hasHeartburn: true
                  hasGas: true
                  hasBloating: true
                  hasHeadache: false
                  memo: "속이 너무 안좋음, 너무 배부름"
      responses:
        '201':
          description: 식후 반응 생성 성공 (자동 계산된 overallScore, grade 포함)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReactionResponse'
              examples:
                goodReaction:
                  summary: GOOD 등급 응답
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      id: 1
                      mealId: 1
                      digestionLevel: 5
                      fullnessLevel: 4
                      energyLevel: 5
                      hasHeartburn: false
                      hasGas: false
                      hasBloating: false
                      hasHeadache: false
                      memo: "소화도 잘 되고 에너지도 넘침!"
                      overallScore: 4.67
                      grade: GOOD
                      createdAt: "2025-02-24T12:00:00"
                normalReaction:
                  summary: NORMAL 등급 응답 (증상 페널티 적용)
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      id: 2
                      mealId: 2
                      digestionLevel: 3
                      fullnessLevel: 4
                      energyLevel: 3
                      hasHeartburn: false
                      hasGas: true
                      hasBloating: false
                      hasHeadache: false
                      memo: "약간 배에서 가스가 찬느낌"
                      overallScore: 3.0
                      grade: NORMAL
                      createdAt: "2025-02-24T12:00:00"
                badReaction:
                  summary: BAD 등급 응답 (다중 페널티 적용)
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      id: 3
                      mealId: 3
                      digestionLevel: 2
                      fullnessLevel: 2
                      energyLevel: 1
                      hasHeartburn: true
                      hasGas: true
                      hasBloating: true
                      hasHeadache: false
                      memo: "속이 너무 안좋음, 너무 배부름"
                      overallScore: 2.0
                      grade: BAD
                      createdAt: "2025-02-24T12:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    get:
      tags: [Reactions]
      summary: 식후 반응 조회
      description: |
        특정 식사에 대한 식후 반응을 조회합니다.

        ## 비즈니스 규칙
        - 반응이 없을 경우 `null` 반환 (404 아님)
        - 다른 사용자의 식사 반응 조회 시 403 에러

        ## UI 표시 가이드
        - **데이터 없음 처리**:
          - `data: null`일 경우 "아직 반응을 기록하지 않았습니다" 메시지
          - "반응 기록하기" CTA 버튼 표시

        - **데이터 있을 때**:
          - 등급 뱃지 크게 표시 (색상: GOOD/#22c55e, NORMAL/#eab308, BAD/#ef4444)
          - 종합 점수: "4.67/5.0" 형식
          - 세부 항목: 이모지와 함께 점수 표시
          - 증상 체크: 있으면 아이콘으로 표시
          - 메모: 따로 카드로 분리

      operationId: getReaction
      parameters:
        - name: mealId
          in: path
          required: true
          description: 식사 ID
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: 식후 반응 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReactionResponse'
              examples:
                withReaction:
                  summary: 반응이 있는 경우
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data:
                      id: 1
                      mealId: 1
                      digestionLevel: 5
                      fullnessLevel: 4
                      energyLevel: 5
                      hasHeartburn: false
                      hasGas: false
                      hasBloating: false
                      hasHeadache: false
                      memo: "소화도 잘 되고 에너지도 넘침!"
                      overallScore: 4.67
                      grade: GOOD
                      createdAt: "2025-02-24T12:00:00"
                withoutReaction:
                  summary: 반응이 없는 경우
                  value:
                    success: true
                    timestamp: "2025-02-24T12:00:00"
                    data: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Reactions]
      summary: 식후 반응 수정
      description: |
        특정 식사에 대한 식후 반응을 수정합니다.

        ## 비즈니스 규칙
        - 반응이 없을 경우 404 에러 반환
        - 종합 점수와 등급은 수정된 값으로 재계산

        ## UI 표시 가이드
        - **Pre-fill**: 기존 반응 데이터로 폼 자동 채움
        - **실시간 계산**: 수정 시마다 예상 점수/등급 표시
        - **저장 후**: "반응이 수정되었습니다" 메시지 + 업데이트된 데이터 표시

      operationId: updateReaction
      parameters:
        - name: mealId
          in: path
          required: true
          description: 식사 ID
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReactionCreateRequest'
            examples:
              updateReaction:
                summary: 반응 수정
                description: BAD → GOOD 등급으로 변경
                value:
                  digestionLevel: 5
                  fullnessLevel: 4
                  energyLevel: 5
                  hasHeartburn: false
                  hasGas: false
                  hasBloating: false
                  hasHeadache: false
                  memo: "다시 먹어봤는데 소화 잘 됨"
      responses:
        '200':
          description: 식후 반응 수정 성공 (재계산된 overallScore, grade 포함)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReactionResponse'
              examples:
                updatedReaction:
                  summary: 수정된 반응 응답
                  value:
                    success: true
                    timestamp: "2025-02-24T12:30:00"
                    data:
                      id: 1
                      mealId: 1
                      digestionLevel: 5
                      fullnessLevel: 4
                      energyLevel: 5
                      hasHeartburn: false
                      hasGas: false
                      hasBloating: false
                      hasHeadache: false
                      memo: "다시 먹어봤는데 소화 잘 됨"
                      overallScore: 4.67
                      grade: GOOD
                      createdAt: "2025-02-24T12:00:00"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: 식후 반응을 찾을 수 없음
          content:
            application/json:
              schema:
                type: object
                required: [success, error, timestamp]
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    required: [code, message]
                    properties:
                      code:
                        type: string
                        example: REACTION_001
                      message:
                        type: string
                        example: "식후 반응 기록을 찾을 수 없습니다."
                  timestamp:
                    type: string
                    format: date-time

# ========================================================================
# COMPONENTS - 스키마 정의
# ========================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT 액세스 토큰 (Authorization: Bearer {token})'

  # -----------------------------------------------------------------------
  # 공통 스키마 (Common Schemas)
  # -----------------------------------------------------------------------
  schemas:
    # --------------------------------------------------------
    # 공통 응답 (Common Response)
    # --------------------------------------------------------
    SuccessResponse:
      type: object
      required: [success, timestamp]
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        timestamp:
          type: string
          format: date-time
          description: 응답 시간
          example: "2025-02-24T12:00:00"

    # --------------------------------------------------------
    # 식후 반응 요청/응답 스키마 (Reaction Schemas)
    # --------------------------------------------------------
    ReactionCreateRequest:
      type: object
      description: 식후 반응 생성/수정 요청
      required: [digestionLevel, fullnessLevel, energyLevel]
      properties:
        digestionLevel:
          type: integer
          description: '소화 상태 (1: 매우 불편함 ~ 5: 매우 편안함)'
          minimum: 1
          maximum: 5
          example: 4
          x-emoji: "🤢~😊"
        fullnessLevel:
          type: integer
          description: '포만감 (1: 여전히 배고픔 ~ 5: 너무 부름)'
          minimum: 1
          maximum: 5
          example: 3
          x-emoji: "😋~😫"
        energyLevel:
          type: integer
          description: '에너지 레벨 (1: 나른함 ~ 5: 에너지 넘침)'
          minimum: 1
          maximum: 5
          example: 5
          x-emoji: "😴~⚡"
        hasHeartburn:
          type: boolean
          description: 속쓰림 여부
          default: false
          example: false
          x-emoji: "🔥"
        hasGas:
          type: boolean
          description: 가스 차는 여부
          default: false
          example: false
          x-emoji: "💨"
        hasBloating:
          type: boolean
          description: 배부팅 여부
          default: false
          example: false
          x-emoji: "🎈"
        hasHeadache:
          type: boolean
          description: 두통 여부
          default: false
          example: false
          x-emoji: "🤕"
        memo:
          type: string
          description: 추가 메모
          nullable: true
          maxLength: 500
          example: "소화가 잘 되고 기분 좋음"
          x-ui: textarea

    ReactionResponse:
      type: object
      description: 식후 반응 응답 (자동 계산된 점수/등급 포함)
      required: [id, mealId, digestionLevel, fullnessLevel, energyLevel,
                 hasHeartburn, hasGas, hasBloating, hasHeadache,
                 overallScore, grade, createdAt]
      properties:
        id:
          type: integer
          format: int64
          description: 반응 ID
          example: 1
        mealId:
          type: integer
          format: int64
          description: 연결된 식사 ID
          example: 1
        digestionLevel:
          type: integer
          description: '소화 상태 (1: 매우 불편함 ~ 5: 매우 편안함)'
          minimum: 1
          maximum: 5
          example: 4
        fullnessLevel:
          type: integer
          description: '포만감 (1: 여전히 배고픔 ~ 5: 너무 부름)'
          minimum: 1
          maximum: 5
          example: 3
        energyLevel:
          type: integer
          description: '에너지 레벨 (1: 나른함 ~ 5: 에너지 넘침)'
          minimum: 1
          maximum: 5
          example: 5
        hasHeartburn:
          type: boolean
          description: 속쓰림 여부
          example: false
        hasGas:
          type: boolean
          description: 가스 차는 여부
          example: false
        hasBloating:
          type: boolean
          description: 배부팅 여부
          example: false
        hasHeadache:
          type: boolean
          description: 두통 여부
          example: false
        memo:
          type: string
          description: 추가 메모
          nullable: true
          example: "소화가 잘 되고 기분 좋음"
        overallScore:
          type: number
          format: double
          description: |
            종합 식후 점수 (1-5, 자동 계산됨)

            ## 계산 공식
            ```
            기본 점수 = digestionLevel + fullnessLevel + energyLevel
            페널티 = 속쓰림(-1) + 가스(-0.5) + 배부팅(-0.5) + 두통(-1)
            최종 점수 = max(1, min(5, 기본 점수 + 페널티))
            ```
          example: 4.67
          minimum: 1.0
          maximum: 5.0
        grade:
          $ref: '#/components/schemas/GradeType'
        createdAt:
          type: string
          format: date-time
          description: 반응 기록 시간
          example: "2025-02-24T12:00:00"

    GradeType:
      type: string
      enum: [GOOD, NORMAL, BAD]
      description: |
        등급 (자동 계산됨)

        ## 등급 기준
        - **GOOD**: 최종 점수 4.0 이상
        - **NORMAL**: 최종 점수 2.5 이상 ~ 4.0 미만
        - **BAD**: 최종 점수 2.5 미만

        ## UI 색상 가이드
        - GOOD: `#22c55e` (초록)
        - NORMAL: `#eab308` (노랑)
        - BAD: `#ef4444` (빨강)
      x-ui-colors:
        GOOD: "#22c55e"
        NORMAL: "#eab308"
        BAD: "#ef4444"

  # -----------------------------------------------------------------------
  # 공통 에러 응답 (Error Responses)
  # -----------------------------------------------------------------------
  responses:
    BadRequest:
      description: 잘못된 요청 (파라미터 유효성 검증 실패)
      content:
        application/json:
          schema:
            type: object
            required: [success, error, timestamp]
            properties:
              success:
                type: boolean
                example: false
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum:
                      - REACTION_003
                      - REACTION_004
                      - REACTION_005
                      - REACTION_006
                      - VALIDATION_ERROR
                  message:
                    type: string
                    example: "소화 상태는 1~5 사이 값이어야 합니다."
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: "digestionLevel"
                        message:
                          type: string
                          example: "{validation.reaction.digestionLevel.range}"
              timestamp:
                type: string
                format: date-time
          examples:
            digestionLevelInvalid:
              summary: 소화 상태 범위 오류
              value:
                success: false
                timestamp: "2025-02-24T12:00:00"
                error:
                  code: REACTION_003
                  message: "소화 상태는 1~5 사이 값이어야 합니다."
                  details:
                    - field: "digestionLevel"
                      message: "소화 상태는 1~5 사이여야 합니다."
            validationError:
              summary: 복합 검증 에러
              value:
                success: false
                timestamp: "2025-02-24T12:00:00"
                error:
                  code: VALIDATION_ERROR
