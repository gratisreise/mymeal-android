openapi: 3.1.0
info:
  title: MyMeal API - Meals
  description: |
    MyMeal 앱 식사 관리 API 명세서

    ## 핵심 기능
    - 사진 촬영을 통한 식사 기록
    - AI 기반 음식 분석 (비동기 처리)
    - 식사 목록 조회 (페이지네이션 + 필터링)
    - 식사 상세 조회 (AI 분석 결과 + 식후 반응 포함)
    - 사진 재촬영 및 AI 재분석

    ## 사용자 흐름
    1. 사진 촬영 → 식사 저장 → AI 백그라운드 분석 시작
    2. 식사 목록/상세 조회
    3. (선택) 1시간 후 식후 반응 기록 (Reaction API)
    4. (선택) 사진 재촬영으로 AI 재분석

  version: 1.0.0
  contact:
    name: MyMeal Team
    email: api@mymeal.com

servers:
  - url: http://localhost:8080/api/v1
    description: 로컬 개발 환경
  - url: https://api.mymeal.com/api/v1
    description: 프로덕션 환경

# ========================================================================
# 공통 응답 형태 (Standard Response Format)
# ========================================================================
# 모든 API는 다음 3가지 형태 중 하나로 응답합니다.
#
# 1. 성공 + 단일 데이터
#    {
#      "success": true,
#      "data": { ... },
#      "timestamp": "2026-02-24T10:30:00"
#    }
#
# 2. 성공 + 리스트 + 페이지네이션
#    {
#      "success": true,
#      "data": {
#        "content": [...],
#        "pagination": { ... }
#      },
#      "timestamp": "2026-02-24T10:30:00"
#    }
#
# 3. 성공 + 데이터 없음
#    {
#      "success": true,
#      "data": null,
#      "timestamp": "2026-02-24T10:30:00"
#    }
# ========================================================================

tags:
  - name: Meals
    description: 식사 관리

paths:
  # ========================================================================
  # MEALS - 식사 관리
  # ========================================================================
  /meals:
    post:
      tags: [Meals]
      summary: 식사 생성
      description: |
        사진을 업로드하고 식사를 저장합니다. AI 음식 분석이 백그라운드에서 비동기로 진행됩니다.

        **처리 흐름:**
        1. 사진 S3 업로드
        2. 식사 데이터 저장
        3. AI 분석 큐에 등록 (백그라운드 처리)
        4. 즉시 식사 데이터 반환 (AI 분석 결과 제외)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateMealRequest'
            encoding:
              photo:
                contentType: image/jpeg, image/png, image/heic
      responses:
        '201':
          $ref: '#/components/responses/SuccessWithMealData'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

    get:
      tags: [Meals]
      summary: 식사 목록 조회
      description: |
        페이지네이션과 필터링을 지원하는 식사 목록 조회입니다.

        **쿼리 파라미터 조합:**
        - 날짜 범위: `startDate` ~ `endDate` (YYYY-MM-DD)
        - 식사 유형 필터: `mealType` (BREAKFAST, LUNCH, DINNER, SNACK)
        - 페이지네이션: `page`, `size`
      security:
        - BearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: "시작일 (YYYY-MM-DD)"
          example: "2026-02-01"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: "종료일 (YYYY-MM-DD)"
          example: "2026-02-28"
        - name: mealType
          in: query
          schema:
            type: string
            enum: [BREAKFAST, LUNCH, DINNER, SNACK]
          description: 식사 유형 필터
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: 페이지 번호 (0부터 시작)
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: 페이지 크기
      responses:
        '200':
          $ref: '#/components/responses/SuccessWithMealListPagination'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /meals/{id}:
    get:
      tags: [Meals]
      summary: 식사 상세 조회
      description: |
        AI 분석 결과와 식후 반응을 포함한 식사 상세 정보를 조회합니다.

        **반환 데이터:**
        - 기본 식사 정보
        - AI 분석 결과 (완료된 경우)
        - 식후 반응 (기록된 경우)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MealId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessWithMealDetailData'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

    delete:
      tags: [Meals]
      summary: 식사 삭제
      description: |
        식사를 Soft Delete 합니다.

        **삭제 정책:**
        - 식사 데이터는 `deleted_at`으로 Soft Delete
        - 관련된 식후 반응 데이터는 보존됩니다
        - S3 사진 파일은 삭제되지 않습니다
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MealId'
      responses:
        '200':
          $ref: '#/components/responses/SuccessWithNull'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /meals/{id}/photo:
    post:
      tags: [Meals]
      summary: 사진 재촬영
      description: |
        기존 식사의 사진을 새로운 사진으로 교체하고 AI 재분석을 진행합니다.

        **처리 흐름:**
        1. 기존 S3 사진 삭제
        2. 새 사진 업로드
        3. 식사 데이터 업데이트
        4. AI 재분석 큐에 등록 (백그라운드 처리)
        5. 기존 식후 반응 데이터는 보존됨

        **사용 예시:**
        - 처음 찍은 사진이 흐릿한 경우
        - 다른 각도에서 다시 촬영하고 싶은 경우
        - 식사 중간/후 사진을 추가로 찍은 경우
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/MealId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [photo]
              properties:
                photo:
                  type: string
                  format: binary
                  description: |
                    새로운 식사 사진
                    - 최대 파일 크기: 10MB
                    - 지원 포맷: JPEG, PNG, HEIC
                    - 클라이언트 자동 압축: 최대 1920x1920px, 품질 80%
                    - HEIC 자동 변환: JPEG으로 변환 후 업로드 권장
            encoding:
              photo:
                contentType: image/jpeg, image/png, image/heic
      responses:
        '200':
          $ref: '#/components/responses/SuccessWithMealData'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

# ========================================================================
# COMPONENTS - 스키마 정의
# ========================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 액세스 토큰 기반 인증

        **헤더 형식:**
        ```
        Authorization: Bearer <access_token>
        ```

  parameters:
    MealId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: 식사 ID
      example: 123

  # -----------------------------------------------------------------------
  # 요청 스키마 (Request Schemas)
  # -----------------------------------------------------------------------
  schemas:
    CreateMealRequest:
      type: object
      required: [photo, mealType]
      properties:
        photo:
          type: string
          format: binary
          description: |
            식사 사진
            - 최대 파일 크기: 10MB
            - 지원 포맷: JPEG, PNG, HEIC
            - 클라이언트 자동 압축: 최대 1920x1920px, 품질 80%
            - HEIC 자동 변환: JPEG으로 변환 후 업로드 권장
        mealType:
          type: string
          enum: [BREAKFAST, LUNCH, DINNER, SNACK]
          description: 식사 유형
          example: "LUNCH"

  # -----------------------------------------------------------------------
  # 응답 데이터 스키마 (Response Data Schemas)
  # -----------------------------------------------------------------------
    MealData:
      type: object
      description: 기본 식사 데이터 (AI 분석 결과 제외)
      properties:
        id:
          type: integer
          format: int64
          description: 식사 ID
          example: 123
        mealType:
          type: string
          enum: [BREAKFAST, LUNCH, DINNER, SNACK]
          description: 식사 유형
          example: "LUNCH"
        mealTime:
          type: string
          format: date-time
          description: 식사 시간
          example: "2026-02-24T12:30:00"
        photoUrl:
          type: string
          format: uri
          description: S3 식사 사진 URL
          example: "https://s3.ap-northeast-2.amazonaws.com/mymeal/meals/123/photo.jpg"
        hasReaction:
          type: boolean
          description: 식후 반응 기록 여부
          example: false
        createdAt:
          type: string
          format: date-time
          description: 생성일시
          example: "2026-02-24T12:30:00"

    MealDetailData:
      allOf:
        - $ref: '#/components/schemas/MealData'
        - type: object
          properties:
            aiAnalysis:
              $ref: '#/components/schemas/AIAnalysisData'
            reaction:
              $ref: '#/components/schemas/ReactionData'

    AIAnalysisData:
      type: object
      description: "AI 음식 분석 결과 (백그라운드 비동기 처리)"
      properties:
        mealName:
          type: string
          description: AI 추출 식사명
          example: "김치찌개와 쌀밥"
        calories:
          type: number
          format: double
          description: "추정 칼로리 (kcal)"
          example: 650.5
        nutrients:
          $ref: '#/components/schemas/NutrientsData'
        tags:
          type: array
          description: "추출된 음식 태그"
          items:
            type: string
          example: ["매운", "탕", "한식", "밀반찬"]
        confidence:
          type: number
          format: double
          description: "AI 분석 신뢰도 (0~1)"
          example: 0.92

    NutrientsData:
      type: object
      description: 영양소 정보
      properties:
        carbohydrates:
          type: number
          format: double
          description: 탄수화물 (g)
          example: 85.5
        protein:
          type: number
          format: double
          description: 단백질 (g)
          example: 24.3
        fat:
          type: number
          format: double
          description: 지방 (g)
          example: 18.7
        fiber:
          type: number
          format: double
          description: 식이섬유 (g)
          example: 5.2

    ReactionData:
      type: object
      description: 식후 반응 데이터 (1시간 후 기록)
      properties:
        id:
          type: integer
          format: int64
          description: 반응 ID
          example: 456
        mealId:
          type: integer
          format: int64
          description: 식사 ID
          example: 123
        digestionLevel:
          type: integer
          minimum: 1
          maximum: 5
          description: "소화 상태 (1: 불편함 ~ 5: 편안함)"
          example: 4
        fullnessLevel:
          type: integer
          minimum: 1
          maximum: 5
          description: "포만감 (1: 여전히 배고픔 ~ 5: 너무 부름)"
          example: 3
        energyLevel:
          type: integer
          minimum: 1
          maximum: 5
          description: "에너지 레벨 (1: 나른함 ~ 5: 에너지 넘침)"
          example: 4
        hasHeartburn:
          type: boolean
          description: 속쓰림 여부
          example: false
        hasGas:
          type: boolean
          description: 가스 차 여부
          example: false
        hasBloating:
          type: boolean
          description: 배부팅 여부
          example: true
        hasHeadache:
          type: boolean
          description: 두통 여부
          example: false
        memo:
          type: string
          nullable: true
          description: 추가 메모
          example: "조금 배가부른듯"
        overallScore:
          type: number
          format: double
          description: "종합 식후 점수 (0~100)"
          example: 75.5
        grade:
          type: string
          enum: [GOOD, NORMAL, BAD]
          description: 좋음/보통/나쁨 등급
          example: "NORMAL"
        createdAt:
          type: string
          format: date-time
          description: 반응 기록일시
          example: "2026-02-24T13:30:00"

    PaginationData:
      type: object
      description: 페이지네이션 메타데이터
      properties:
        page:
          type: integer
          description: "현재 페이지 (0부터 시작)"
          example: 0
        size:
          type: integer
          description: 페이지 크기
          example: 20
        totalElements:
          type: integer
          description: 전체 요소 수
          example: 145
        totalPages:
          type: integer
          description: 전체 페이지 수
          example: 8
        first:
          type: boolean
          description: 첫 페이지 여부
          example: true
        last:
          type: boolean
          description: 마지막 페이지 여부
          example: false

    ErrorDetail:
      type: object
      description: 에러 상세 정보
      properties:
        code:
          type: string
          description: 에러 코드
          example: "MEAL_NOT_FOUND"
        message:
          type: string
          description: 에러 메시지
          example: "식사를 찾을 수 없습니다"
        details:
          type: object
          nullable: true
          description: 추가 에러 상세
          example: null

  # -----------------------------------------------------------------------
  # 공통 응답 (Common Responses)
  # -----------------------------------------------------------------------
  responses:
    # --------------------------------------------------------
    # Meal 관련 응답
    # --------------------------------------------------------
    SuccessWithMealData:
      description: "요청 성공 (단일 식사 데이터)"
      content:
        application/json:
          schema:
            type: object
            required: [success, data, timestamp]
            properties:
              success:
                type: boolean
                example: true
              data:
                $ref: '#/components/schemas/MealData'
              timestamp:
                type: string
                format: date-time
                example: "2026-02-24T12:30:00"
          example:
            success: true
            data:
              id: 123
              mealType: "LUNCH"
              mealTime: "2026-02-24T12:30:00"
              photoUrl: "https://s3.ap-northeast-2.amazonaws.com/mymeal/meals/123/photo.jpg"
              hasReaction: false
              createdAt: "2026-02-24T12:30:00"
            timestamp: "2026-02-24T12:30:05"

    SuccessWithMealDetailData:
      description: "요청 성공 (상세 식사 데이터 - AI 분석 + 반응 포함)"
      content:
        application/json:
          schema:
            type: object
            required: [success, data, timestamp]
            properties:
              success:
                type: boolean
                example: true
              data:
                $ref: '#/components/schemas/MealDetailData'
              timestamp:
                type: string
                format: date-time
                example: "2026-02-24T12:30:00"
          example:
            success: true
            data:
              id: 123
              mealType: "LUNCH"
              mealTime: "2026-02-24T12:30:00"
              photoUrl: "https://s3.ap-northeast-2.amazonaws.com/mymeal/meals/123/photo.jpg"
              hasReaction: true
              createdAt: "2026-02-24T12:30:00"
              aiAnalysis:
                mealName: "김치찌개와 쌀밥"
                calories: 650.5
                nutrients:
                  carbohydrates: 85.5
                  protein: 24.3
                  fat: 18.7
                  fiber: 5.2
                tags: ["매운", "탕", "한식", "밀반찬"]
                confidence: 0.92
              reaction:
                id: 456
                mealId: 123
                digestionLevel: 4
                fullnessLevel: 3
                energyLevel: 4
                hasHeartburn: false
                hasGas: false
                hasBloating: true
                hasHeadache: false
                memo: "조금 배가부른듯"
                overallScore: 75.5
                grade: "NORMAL"
                createdAt: "2026-02-24T13:30:00"
            timestamp: "2026-02-24T13:35:00"

    SuccessWithMealListPagination:
      description: "요청 성공 (식사 목록 + 페이지네이션)"
      content:
        application/json:
          schema:
            type: object
            required: [success, data, timestamp]
            properties:
              success:
                type: boolean
                example: true
              data:
                type: object
                required: [content, pagination]
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/MealData'
                  pagination:
                    $ref: '#/components/schemas/PaginationData'
              timestamp:
                type: string
                format: date-time
                example: "2026-02-24T12:30:00"
          example:
            success: true
            data:
              content:
                - id: 123
                  mealType: "LUNCH"
                  mealTime: "2026-02-24T12:30:00"
                  photoUrl: "https://s3.ap-northeast-2.amazonaws.com/mymeal/meals/123/photo.jpg"
                  hasReaction: true
                  createdAt: "2026-02-24T12:30:00"
                - id: 122
                  mealType: "BREAKFAST"
                  mealTime: "2026-02-24T08:00:00"
                  photoUrl: "https://s3.ap-northeast-2.amazonaws.com/mymeal/meals/122/photo.jpg"
                  hasReaction: true
                  createdAt: "2026-02-24T08:00:00"
              pagination:
                page: 0
                size: 20
                totalElements: 145
                totalPages: 8
                first: true
                last: false
            timestamp: "2026-02-24T12:30:10"

    # --------------------------------------------------------
    # 공통 응답 (데이터 없음)
    # --------------------------------------------------------
    SuccessWithNull:
      description: "요청 성공 (데이터 없음)"
      content:
        application/json:
          schema:
            type: object
            required: [success, data, timestamp]
            properties:
              success:
                type: boolean
                example: true
              data:
                type: null
                nullable: true
              timestamp:
                type: string
                format: date-time
          example:
            success: true
            data: null
            timestamp: "2026-02-24T12:30:15"

    # --------------------------------------------------------
    # 에러 응답
    # --------------------------------------------------------
    ErrorResponse:
      description: "요청 실패 (에러 응답)"
      content:
        application/json:
          schema:
            type: object
            required: [success, error, timestamp]
            properties:
              success:
                type: boolean
                example: false
              error:
                $ref: '#/components/schemas/ErrorDetail'
              timestamp:
                type: string
                format: date-time
          examples:
            notFound:
              summary: 식사를 찾을 수 없음
              value:
                success: false
                error:
                  code: "MEAL_NOT_FOUND"
                  message: "식사를 찾을 수 없습니다"
                  details: null
                timestamp: "2026-02-24T12:30:00"
            unauthorized:
              summary: 인증 실패
              value:
                success: false
                error:
                  code: "UNAUTHORIZED"
                  message: "인증이 필요합니다"
                  details: null
                timestamp: "2026-02-24T12:30:00"
            badRequest:
              summary: 잘못된 요청
              value:
                success: false
                error:
                  code: "BAD_REQUEST"
                  message: "잘못된 요청입니다"
                  details:
                    field: "mealType"
                    rejectedValue: "DINNER"
                    message: "식사 유형이 올바르지 않습니다"
                timestamp: "2026-02-24T12:30:00"
