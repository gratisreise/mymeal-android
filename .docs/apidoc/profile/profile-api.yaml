openapi: 3.0.3
info:
  title: MyMeal Profile API
  version: 1.0.0
  description: |
    MyMeal 서비스의 프로필 관리 API 명세서입니다.

    이 API는 다음 기능을 제공합니다:
    - 프로필 조회 및 수정
    - 식사 통계 조회
    - 몸의 패턴 분석 (좋은/나쁜 태그)

  contact:
    name: MyMeal API Support
    email: support@mymeal-server.com

  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.mymeal-server.com
    description: Production server

tags:
  - name: Profile
    description: 프로필/통계 API

security:
  - BearerAuth: []

paths:
  /api/v1/profile:
    get:
      tags:
        - Profile
      summary: 프로필 조회
      description: |
        로그인한 사용자의 프로필 정보를 조회합니다.

        **반환 정보:**
        - 회원 ID
        - 이메일
        - 이름
        - 프로필 이미지 URL (설정한 경우)
        - 가입일
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 프로필 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_ProfileResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileResponse'
              examples:
                success:
                  summary: 프로필 조회 성공
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      id: 1
                      email: user@example.com
                      name: 홍길동
                      profileImage: "https://s3.amazonaws.com/bucket/profile.jpg"
                      createdAt: "2025-01-15T09:00:00"
                noProfileImage:
                  summary: 프로필 이미지 없음
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      id: 2
                      email: user2@example.com
                      name: 김철수
                      profileImage: null
                      createdAt: "2025-01-20T14:30:00"
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notLoggedIn:
                  summary: 로그인되지 않음
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_008
                      message: "로그인이 필요한 서비스입니다."
                invalidToken:
                  summary: 유효하지 않은 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_003
                      message: "유효하지 않은 토큰입니다."
                expiredToken:
                  summary: 만료된 토큰
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: AUTH_002
                      message: "액세스 토큰이 만료되었습니다."
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  summary: 사용자 없음
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: MEMBER_001
                      message: "사용자를 찾을 수 없습니다."

    put:
      tags:
        - Profile
      summary: 프로필 수정
      description: |
        로그인한 사용자의 프로필 정보를 수정합니다.

        **수정 가능한 필드:**
        - 이름: 최대 50자
        - 프로필 이미지: S3 URL 또는 null (삭제 시)

        **유효성 검사:**
        - 이름: 최대 50자 (초과 시 400 에러)
        - 프로필 이미지: nullable (삭제 가능)
      operationId: updateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              updateName:
                summary: 이름만 수정
                value:
                  name: 이영희
                  profileImage: null
              updateNameAndImage:
                summary: 이름과 프로필 이미지 수정
                value:
                  name: 이영희
                  profileImage: "https://s3.amazonaws.com/bucket/new-profile.jpg"
              deleteImage:
                summary: 프로필 이미지 삭제
                value:
                  name: 홍길동
                  profileImage: null
      responses:
        '200':
          description: 프로필 수정 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_ProfileResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProfileResponse'
              examples:
                success:
                  summary: 프로필 수정 성공
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      id: 1
                      email: user@example.com
                      name: 이영희
                      profileImage: "https://s3.amazonaws.com/bucket/new-profile.jpg"
                      createdAt: "2025-01-15T09:00:00"
        '400':
          description: 유효성 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                nameTooLong:
                  summary: 이름 50자 초과
                  value:
                    success: false
                    timestamp: "2025-02-24T10:30:00"
                    error:
                      code: VAL_002
                      message: "이름은 50자 이내로 입력해야 합니다."
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/profile/statistics:
    get:
      tags:
        - Profile
      summary: 통계 조회
      description: |
        로그인한 사용자의 식사 통계를 조회합니다.

        **제공 통계:**
        - 총 식사 횟수
        - 반응 기록률 (반응을 남긴 식사 비율)
        - TOP 5 태그 (가장 많이 섭취한 음식 태그)
        - 최근 7일간 주간 트렌드 (일별 평균 점수)

        **계산 기준:**
        - 반응률: (반응 기록 수 / 총 식사 수) × 100
        - TOP 5 태그: 태그별 섭취 횟수 기준 내림차순
        - 주간 트렌드: 최근 7일간 일별 평균 반응 점수
      operationId: getStatistics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 통계 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_StatisticsResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StatisticsResponse'
              examples:
                withTrend:
                  summary: 통계 조회 (주간 트렌드 포함)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      totalMealCount: 150
                      reactionRate: 73.33
                      topTags:
                        - tag: "닭가슴살"
                          count: 25
                        - tag: "현미밥"
                          count: 20
                        - tag: "브로콜리"
                          count: 18
                        - tag: "계란"
                          count: 15
                        - tag: "고구마"
                          count: 12
                      weeklyTrend:
                        - date: "2025-02-17"
                          averageScore: 3.8
                        - date: "2025-02-18"
                          averageScore: 4.1
                        - date: "2025-02-19"
                          averageScore: 3.5
                        - date: "2025-02-20"
                          averageScore: 4.0
                        - date: "2025-02-21"
                          averageScore: 3.9
                        - date: "2025-02-22"
                          averageScore: 4.2
                        - date: "2025-02-23"
                          averageScore: 3.7
                noReactions:
                  summary: 반응 기록 없음
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      totalMealCount: 5
                      reactionRate: 0.0
                      topTags: []
                      weeklyTrend: []
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/profile/patterns:
    get:
      tags:
        - Profile
      summary: 내 몸의 패턴 조회
      description: |
        로그인한 사용자의 몸의 패턴을 조회합니다.

        **분석 기준:**
        - 좋은 태그: 평균 점수 4.0 이상, 최소 3회 섭취
        - 나쁜 태그: 평균 점수 2.5 이하, 최소 3회 섭취
        - 전체 평균: 모든 식사의 평균 반응 점수

        **데이터 제공:**
        - 좋은 태그 목록 (태그명, 평균 점수, 섭취 횟수)
        - 나쁜 태그 목록 (태그명, 평균 점수, 섭취 횟수)
        - 전체 평균 점수

        **활용:**
        - 잘 맞는 음식과 안 맞는 음식 파악
        - 식단 추천에 활용
        - 건강 관리 참고
      operationId: getBodyPatterns
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 몸의 패턴 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse_BodyPatternResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BodyPatternResponse'
              examples:
                withPatterns:
                  summary: 패턴 조회 (좋은/나쁜 태그 포함)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      goodTags:
                        - tag: "닭가슴살"
                          averageScore: 4.5
                          count: 25
                        - tag: "브로콜리"
                          averageScore: 4.3
                          count: 18
                        - tag: "고구마"
                          averageScore: 4.1
                          count: 12
                      badTags:
                        - tag: "라면"
                          averageScore: 2.1
                          count: 8
                        - tag: "튀김"
                          averageScore: 2.3
                          count: 5
                        - tag: "마요네즈"
                          averageScore: 2.4
                          count: 4
                      overallAverageScore: 3.65
                noPatterns:
                  summary: 패턴 데이터 없음 (섭취 횟수 부족)
                  value:
                    success: true
                    timestamp: "2025-02-24T10:30:00"
                    data:
                      goodTags: []
                      badTags: []
                      overallAverageScore: 0.0
        '401':
          description: 인증되지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 인증 방식입니다.

        **헤더 형식:**
        ```
        Authorization: Bearer <access_token>
        ```

        **액세스 토큰:**
        - 유효기간: 1시간
        - 헤더에 포함하여 API 호출

  schemas:
    # ========================================
    # Request Schemas
    # ========================================

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          description: |
            수정할 이름 (최대 50자)

            null인 경우 이름은 변경되지 않습니다.
          example: 이영희
          maxLength: 50
          nullable: true
        profileImage:
          type: string
          format: uri
          description: |
            프로필 이미지 URL

            - S3 URL: 새로운 이미지로 변경
            - null: 이미지 삭제

            **주의:** 일반 URL은 허용되지 않습니다.
          example: "https://s3.amazonaws.com/bucket/profile.jpg"
          nullable: true

    # ========================================
    # Response Schemas
    # ========================================

    ProfileResponse:
      type: object
      required:
        - id
        - email
        - name
        - createdAt
      properties:
        id:
          type: integer
          format: int64
          description: 회원 ID
          example: 1
        email:
          type: string
          format: email
          description: 회원 이메일
          example: user@example.com
        name:
          type: string
          description: 회원 이름
          example: 홍길동
        profileImage:
          type: string
          format: uri
          description: 프로필 이미지 URL (설정한 경우만)
          example: "https://s3.amazonaws.com/bucket/profile.jpg"
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: 가입일
          example: "2025-01-15T09:00:00"

    TagCountResponse:
      type: object
      required:
        - tag
        - count
      properties:
        tag:
          type: string
          description: 음식 태그명
          example: "닭가슴살"
        count:
          type: integer
          description: 섭취 횟수
          example: 25
          minimum: 1

    WeeklyTrendResponse:
      type: object
      required:
        - date
        - averageScore
      properties:
        date:
          type: string
          format: date
          description: 날짜
          example: "2025-02-24"
        averageScore:
          type: number
          format: double
          description: 해당 날짜의 평균 반응 점수 (1.0 ~ 5.0)
          example: 3.8
          minimum: 1.0
          maximum: 5.0
          nullable: true

    StatisticsResponse:
      type: object
      required:
        - totalMealCount
        - reactionRate
        - topTags
        - weeklyTrend
      properties:
        totalMealCount:
          type: integer
          description: 총 식사 횟수
          example: 150
          minimum: 0
        reactionRate:
          type: number
          format: double
          description: |
            반응 기록률 (백분율)

            계산식: (반응 기록 수 / 총 식사 수) × 100
          example: 73.33
          minimum: 0.0
          maximum: 100.0
        topTags:
          type: array
          description: |
            TOP 5 태그 (가장 많이 섭취한 음식 태그)

            섭취 횟수 기준 내림차순 정렬
          items:
            $ref: '#/components/schemas/TagCountResponse'
          maxItems: 5
        weeklyTrend:
          type: array
          description: |
            최근 7일간 주간 트렌드

            최근 7일간 일별 평균 반응 점수
          items:
            $ref: '#/components/schemas/WeeklyTrendResponse'
          maxItems: 7

    BodyPatternTagResponse:
      type: object
      required:
        - tag
        - averageScore
        - count
      properties:
        tag:
          type: string
          description: 음식 태그명
          example: "닭가슴살"
        averageScore:
          type: number
          format: double
          description: 평균 반응 점수 (1.0 ~ 5.0)
          example: 4.5
          minimum: 1.0
          maximum: 5.0
        count:
          type: integer
          description: 섭취 횟수 (최소 3회 이상)
          example: 25
          minimum: 3

    BodyPatternResponse:
      type: object
      required:
        - goodTags
        - badTags
        - overallAverageScore
      properties:
        goodTags:
          type: array
          description: |
            좋은 태그 목록

            **분석 기준:**
            - 평균 점수 4.0 이상
            - 최소 3회 섭취
            - 평균 점수 기준 내림차순 정렬
          items:
            $ref: '#/components/schemas/BodyPatternTagResponse'
        badTags:
          type: array
          description: |
            나쁜 태그 목록

            **분석 기준:**
            - 평균 점수 2.5 이하
            - 최소 3회 섭취
            - 평균 점수 기준 오름차순 정렬
          items:
            $ref: '#/components/schemas/BodyPatternTagResponse'
        overallAverageScore:
          type: number
          format: double
          description: |
            전체 평균 점수

            모든 식사의 평균 반응 점수 (1.0 ~ 5.0)
          example: 3.65
          minimum: 0.0
          maximum: 5.0

    # ========================================
    # Common Response Schemas
    # ========================================

    BaseResponse:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        timestamp:
          type: string
          format: date-time
          description: 응답 생성 시간
          example: "2025-02-24T10:30:00"

    SuccessResponse_ProfileResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/ProfileResponse'

    SuccessResponse_StatisticsResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/StatisticsResponse'

    SuccessResponse_BodyPatternResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/BodyPatternResponse'

    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 에러 코드
          example: AUTH_001
        message:
          type: string
          description: 에러 메시지
          example: "이메일 또는 비밀번호가 올바르지 않습니다."

    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          required:
            - error
          properties:
            success:
              type: boolean
              example: false
            error:
              $ref: '#/components/schemas/ErrorDetail'
